<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">

        <div class="top-badge">
            Memory Challenge
        </div>

        <h1>Pattern Memory</h1>

        <p class="subtitle">
            Remember the exact pattern sequence
        </p>

        <div class="pattern-box">

            <div class="pattern-text">
                🔴 🟢 25 Dinosaur 🔵
            </div>

        </div>

        <button id="startBtn">Start Round</button>

        <div class="options-area"></div>

        <div class="timer">
            Timer: 10
        </div>

        <div class="message">
            Watch the sequence carefully...
        </div>

        <div class="stats">

            <div class="score">
                Score: 0
            </div>

            <div class="lives">
                Lives: 3
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
