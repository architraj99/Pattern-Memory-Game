<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Memory Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="top">
      <span class="badge">Memory game</span>
    </div>
    <h1>Pattern recall</h1>
    <p class="sub">Watch the sequence, then rebuild it in order</p>

    <div class="seq-box">
      <span class="seq" id="seq">· · · · ·</span>
    </div> 

    <button class="start-btn" id="startBtn">Start round</button>
    <button class="resign-btn" id="resignBtn">Resign</button>

    <div class="opts" id="opts"></div>

    <div class="timer-row" id="timerRow">

      <div class="track">
        <div class="fill" id="bar" style="width:100%"></div>
      </div>

      <span class="tnum" id="tnum">10</span>
    </div> 

    <p class="msg" id="msg">Ready when you are</p>

    <div class="footer">
      <div>
        <p class="stat-label">Score</p>
        <p class="stat-val" id="scoreEl">0</p>
      </div>

      <div style="text-align:right">
        <p class="stat-label">Lives</p>
      
        <div class="dots" id="dotsEl">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
